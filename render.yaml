databases:
  - name: bist-db
    plan: free

services:
  - type: web
    name: bist-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend:app --timeout 120 --workers 1 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: bist-db
          property: connectionString
